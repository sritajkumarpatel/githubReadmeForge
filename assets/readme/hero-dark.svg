<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="100%">
    <defs>
        
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0b0f19" />
                <stop offset="50%" stop-color="#111827" />
                <stop offset="100%" stop-color="#1e1035" />
            </linearGradient>
            <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
                <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="glow-purple" cx="80%" cy="20%" r="40%">
                <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12" />
                <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
            </radialGradient>
            
        
            <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#3b82f6" />
                <stop offset="50%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
            
        <style>
            .title {
                font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-size: 54px;
                font-weight: 800;
                fill: #ffffff;
                filter: drop-shadow(0px 0px 8px rgba(96, 165, 250, 0.4));
            }
            .desc {
                font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
                font-size: 18px;
                font-weight: 400;
                fill: #9ca3af;
                letter-spacing: -0.01em;
            }
        </style>
    </defs>

    <!-- Background -->
    <rect width="1200" height="420" fill="url(#bg)" />

    <!-- Ambient Lights / Glows -->
    <circle cx="600" cy="210" r="500" fill="url(#glow)" />
    <circle cx="1000" cy="80" r="400" fill="url(#glow-purple)" />

    <!-- Grid Layout Lines -->
    <line x1="50" y1="0" x2="50" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="150" y1="0" x2="150" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="250" y1="0" x2="250" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="350" y1="0" x2="350" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="450" y1="0" x2="450" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="550" y1="0" x2="550" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="650" y1="0" x2="650" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="750" y1="0" x2="750" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="850" y1="0" x2="850" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="950" y1="0" x2="950" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="1050" y1="0" x2="1050" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="1150" y1="0" x2="1150" y2="420" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="0" y1="50" x2="1200" y2="50" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="0" y1="130" x2="1200" y2="130" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="0" y1="290" x2="1200" y2="290" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
<line x1="0" y1="370" x2="1200" y2="370" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />


    <!-- Top Design Element Accent Line -->
    <rect x="0" y="0" width="1200" height="6" fill="url(#accent-gradient)" />

    <!-- Tech Stack / Code Interface Style Overlay (decorative dots) -->
    <circle cx="35" cy="35" r="6" fill="#ef4444" opacity="0.8" />
    <circle cx="55" cy="35" r="6" fill="#f59e0b" opacity="0.8" />
    <circle cx="75" cy="35" r="6" fill="#10b981" opacity="0.8" />

    <!-- Visual Code brackets (decorative frames) -->
    <path d="M 120 140 L 70 140 L 70 280 L 120 280" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />
    <path d="M 1080 140 L 1130 140 L 1130 280 L 1080 280" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />

    <!-- Title -->
    <text x="600" y="130" text-anchor="middle" class="title">githubReadmeForge</text>

    <!-- Description (wrapped tspans) -->
    <text x="600" y="185" text-anchor="middle" class="desc">
        <tspan x="600" y="185">An agentic terminal developer utility</tspan>

    </text>

    <!-- Badges Row -->
    
                <g transform="translate(407.5, 280)">
                    <rect width="82" height="32" rx="16" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="1.5" />
                    <text x="41.0" y="20" font-family="'Outfit', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">Python</text>
                </g>
                
                <g transform="translate(503.5, 280)">
                    <rect width="100" height="32" rx="16" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="1.5" />
                    <text x="50.0" y="20" font-family="'Outfit', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">Rich CLI</text>
                </g>
                
                <g transform="translate(617.5, 280)">
                    <rect width="91" height="32" rx="16" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="1.5" />
                    <text x="45.5" y="20" font-family="'Outfit', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">Git API</text>
                </g>
                
                <g transform="translate(722.5, 280)">
                    <rect width="70" height="32" rx="16" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="1.5" />
                    <text x="35.0" y="20" font-family="'Outfit', -apple-system, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">LLMs</text>
                </g>
                

    <!-- Footer decorative tag -->
    <text x="600" y="380" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#9ca3af" opacity="0.4" text-anchor="middle">&lt;/docs forged&gt;</text>
</svg>
